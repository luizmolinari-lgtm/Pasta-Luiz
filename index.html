<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz da Agricultura Sustentável</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌾 Descubra sua Técnica Agrícola</h1>
        <p class="subtitle">Responda à pergunta abaixo para saber qual prática combina com seu espaço!</p>
        
        <div class="quiz-card">
            <h2 id="pergunta">Qual é o tamanho do seu espaço para plantio?</h2>
            
            <div class="options">
                <button class="btn-option" onclick="verificarResposta('pequeno')">A) Pequeno (Quintal ou Vasos)</button>
                <button class="btn-option" onclick="verificarResposta('medio')">B) Médio (Chácara ou Sítio)</button>
                <button class="btn-option" onclick="verificarResposta('grande')">C) Grande (Fazenda ou Grandes Lotes)</button>
            </div>
        </div>

        <div id="resultado" class="resultado hidden">
            <h3>💡 Recomendação para você:</h3>
            <p id="texto-resultado"></p>
            <button class="btn-reset" onclick="reiniciarQuiz()">Responder Novamente</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
